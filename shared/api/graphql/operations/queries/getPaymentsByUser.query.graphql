query GetPaymentsByUser(
  $userId: Int!
  $pageSize: Int
  $pageNumber: Int
  $sortBy: String
  $sortDirection: SortDirection
) {
  getPaymentsByUser(
    userId: $userId
    pageSize: $pageSize
    pageNumber: $pageNumber
    sortBy: $sortBy
    sortDirection: $sortDirection
  ) {
    pagesCount
    page
    pageSize
    totalCount
    items {
      id
      dateOfPayment
      endDate
      price
      type
      paymentType
    }
  }
}
